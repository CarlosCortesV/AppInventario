<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eliminar Producto</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <header class="text-center mb-4">
            <h1 class="text-danger">Eliminar Producto</h1>
        </header>
        <main>
            <form method="POST" action="/delete" class="mb-4">
                <div class="mb-3">
                    <label for="product_id" class="form-label">ID Producto</label>
                    <input type="number" name="product_id" id="product_id" class="form-control" placeholder="Ingrese el ID del Producto" required>
                </div>
                <button type="submit" class="btn btn-danger">Eliminar Producto</button>
            </form>
            {% if message %}
            <div class="alert alert-info" role="alert">
                {{ message }}
            </div>
            {% endif %}
        </main>
        <footer class="text-center mt-4">
            <a href="/" class="btn btn-secondary">Volver al Home</a>
        </footer>
    </div>
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
